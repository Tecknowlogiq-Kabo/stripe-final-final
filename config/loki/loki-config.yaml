# =============================================================================
# Loki Configuration — Log Aggregation Backend
# =============================================================================
#
# Loki stores structured logs from Alloy (which tails pino-roll files on the
# EC2 host). It indexes logs by label (job, app, log_type) and stores the
# unstructured content in chunks on the filesystem.
#
# KEY DESIGN DECISIONS:
#   - Single-instance mode (replication_factor: 1) — no clustering needed
#     for a single EC2 deployment. Add memberlist + S3 backend for HA later.
#   - TSDB index (schema v13) — faster queries than boltdb-shipper v11.
#     Requires Loki 2.8+. We're on 3.3.
#   - Filesystem storage — simple, no external dependencies. On EC2, the
#     /data EBS volume provides persistence across container restarts.
#   - 30-day general retention, 90-day error retention — balances storage
#     cost against compliance needs. PCI-DSS typically requires 1 year;
#     archive error logs to S3 for long-term compliance.
#
# CONNECTIONS:
#   - Alloy pushes to http://loki:3100/loki/api/v1/push
#   - Grafana queries http://loki:3100 (LogQL)
#   - Alertmanager (future) receives ruler evaluations at localhost:9093
# =============================================================================

# Authentication is disabled because Loki is only accessible on localhost
# (container port binding: 127.0.0.1:3100). If exposing externally, enable
# auth_enabled: true and configure an auth provider.
auth_enabled: false

server:
  http_listen_port: 3100       # HTTP API — log push + queries
  grpc_listen_port: 9096       # gRPC — used by the ruler for alert evaluation
  log_level: info              # info|debug|warn — info for production

# Common configuration shared across all Loki components.
# In single-binary mode, these apply to the distributor, ingester, querier,
# compactor, and ruler running in-process.
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki           # All Loki state lives under /loki inside the container
  storage:
    filesystem:
      chunks_directory: /loki/chunks    # Compressed log chunks
      rules_directory: /loki/rules      # Ruler rule definitions
  replication_factor: 1        # Single instance — no data replication
  ring:
    kvstore:
      store: inmemory          # No external key-value store needed for single instance

# The ingester buffers incoming log writes before flushing them to chunk storage.
ingester:
  chunk_idle_period: 5m        # Flush a chunk if no new data for 5 minutes
  max_chunk_age: 1h            # Flush a chunk even if still receiving data after 1 hour
  chunk_target_size: 1536000   # ~1.5 MB — balances query efficiency vs. flush frequency
  chunk_retain_period: 30s     # Keep flushed chunks in memory briefly for late-arriving data
  max_transfer_retries: 0      # Disabled in single-instance mode (no peers to transfer to)
  wal:
    enabled: true              # Write-Ahead Log — protects against data loss on crash
    dir: /loki/wal

# Schema config — defines how Loki indexes log streams.
# TSDB (v13) is the recommended schema as of Loki 2.8+.
schema_config:
  configs:
    - from: "2024-01-01"       # Start date for this schema (arbitrary, covers all data)
      store: tsdb              # Time Series DataBase index — faster than boltdb
      object_store: filesystem # Where chunks are stored
      schema: v13              # Latest schema version
      index:
        prefix: index_         # Prefix for index files on disk
        period: 24h            # One index table per day

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index    # Where the active TSDB index lives
    cache_location: /loki/tsdb-cache            # Query-time index cache

# Limits and retention — control query safety and data lifecycle.
limits_config:
  allow_structured_metadata: true          # Enables logfmt metadata in push payloads
  reject_old_samples: true                 # Reject log lines older than 7 days
  reject_old_samples_max_age: 168h         # 7 days — prevents backfill abuse
  max_entries_limit_per_query: 5000        # Protect against unbounded queries

  # General retention: 30 days (720 hours).
  # After this, logs are eligible for deletion by the compactor.
  retention_period: 720h

  # Per-stream retention override: errors live longer.
  # The Alloy config labels error logs with {log_type="error"}.
  retention_stream:
    - selector: '{log_type="error"}'       # Match error-level pino-roll output
      priority: 1                          # Overrides the general retention_period
      period: 2160h                        # 90 days for error logs

# The compactor enforces retention by deleting expired chunks.
# It merges small chunks for query efficiency and removes data past retention.
compactor:
  working_directory: /loki/compactor
  retention_enabled: true                  # Actually delete expired data
  retention_delete_delay: 2h               # Grace period before hard delete
  delete_request_store: filesystem         # Store delete request records locally

# Query acceleration — embedded cache avoids an external Redis/memcached.
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100                    # 100 MB of query result cache

# The ruler evaluates alerting rules on a schedule and sends notifications
# to Alertmanager. Currently using a local-only Alertmanager endpoint.
# Replace with a real Alertmanager instance (docker-compose service or SaaS)
# when alerting is enabled.
ruler:
  alertmanager_url: http://localhost:9093
