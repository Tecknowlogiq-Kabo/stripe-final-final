version: '3.9'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: stripe_oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD}
      APP_USER: ${ORACLE_USER}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s
    networks:
      - stripe_net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: stripe_api
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      ORACLE_HOST: oracle
      OTEL_SERVICE_NAME: stripe-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      oracle:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - stripe_net
    command: npm run start:dev

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: stripe_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - stripe_net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: stripe_web
    env_file:
      - ./apps/web/.env.local
    environment:
      NODE_ENV: development
      API_URL: http://api:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - stripe_net
    command: npm run dev

volumes:
  oracle_data:
    driver: local

networks:
  stripe_net:
    driver: bridge
